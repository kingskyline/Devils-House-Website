<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supra Mk4 Build | Devils House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="antialiased">
    <div id="header-placeholder"></div>

    <section class="relative bg-gray-900 py-20 border-b border-gray-800">
        <div class="container mx-auto px-6 text-center">
            <span class="badge badge-plan">⚫ Planning</span>
            <h1 class="text-6xl font-black text-white mb-4 mt-4">Fanhome 1:8 <span class="text-red-500">Supra Mk4</span></h1>
        </div>
    </section>

    <nav class="bg-gray-900 sticky top-0 z-10 border-b border-gray-700 shadow-md">
        <div class="container mx-auto px-6">
            <div class="flex justify-center space-x-8">
                <button class="tab-btn text-purple-500 border-purple-500 font-bold py-4 px-4 border-b-4" onclick="openTab(event, 'media')">Build Playlist</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 min-h-[50vh]">
        <div id="media" class="tab-content active max-w-4xl mx-auto">
            <h2 class="text-3xl font-bold text-white mb-6 border-b border-gray-700 pb-2">Build Playlist</h2>
            <div class="aspect-video w-full rounded-xl overflow-hidden border border-gray-700">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/videoseries?list=YOUR_SUPRA_PLAYLIST_ID" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../main.js" defer></script>
</body>
</html>
