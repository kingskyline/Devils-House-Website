<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supra Mk4 Build | Devils House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="antialiased bg-gray-900 text-gray-200">
    <div id="header-placeholder"></div>

    <section class="relative bg-gray-900 py-20 border-b border-gray-800">
        <div class="container mx-auto px-6 text-center">
            <span class="inline-block bg-gray-700 text-gray-400 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest border border-gray-500 mb-6">⚫ Planning</span>
            <h1 class="text-6xl font-black text-white mb-4 mt-4">Fanhome 1:8 <span class="text-red-500">Supra Mk4</span></h1>
        </div>
    </section>

    <nav class="bg-gray-900 sticky top-0 z-10 border-b border-gray-700 shadow-md">
        <div class="container mx-auto px-6">
            <div class="flex justify-center space-x-2 sm:space-x-8 overflow-x-auto">
                <button class="tab-btn text-purple-500 border-purple-500 hover:text-white font-bold py-4 px-4 border-b-4 transition-colors" onclick="openTab(event, 'media')">Build Playlist</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12 min-h-[50vh]">
        <div id="media" class="tab-content active max-w-4xl mx-auto">
            <h2 class="text-3xl font-bold text-white mb-6 border-b border-gray-700 pb-2">Build Playlist</h2>
            <div class="aspect-video w-full rounded-xl overflow-hidden border border-gray-700 shadow-xl">
                <iframe class="w-full h-full" src="https://www.youtube.com/embed/videoseries?list=YOUR_SUPRA_PLAYLIST_ID" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../main.js" defer></script>
    <script>
        function openTab(evt, tabName) {
            let i, tabcontent, tabbtns;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
            tabbtns = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tabbtns.length; i++) {
                tabbtns[i].classList.remove("text-purple-500", "border-purple-500");
                tabbtns[i].classList.add("text-gray-400", "border-transparent");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.remove("text-gray-400", "border-transparent");
            evt.currentTarget.classList.add("text-purple-500", "border-purple-500");
        }
    </script>
</body>
</html>
